name: Publish to npm

# Publishes @rushobservability/rum-sdk on a GitHub Release (or manual dispatch).
#
# Auth = npm Trusted Publishing (OIDC): there is NO npm token stored in the repo.
# The job exchanges a short-lived GitHub OIDC token for scoped publish rights, so
# there is no secret for a malicious PR to steal. npm verifies the exact repo +
# workflow identity, and this workflow never runs on pull_request.
#
# Requires (one-time, on npmjs.com → the package → Settings → Trusted Publisher):
#   Provider: GitHub Actions
#   Org/Repo: RushObservability/rum-sdk
#   Workflow: publish.yml
#   Environment: npm-publish
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    # Deployment gate: the `npm-publish` Environment carries required-reviewer
    # approval + a branch rule (main/tags only), so a publish pauses for a human
    # OK and can't run from an arbitrary ref even after a merge.
    environment: npm-publish
    permissions:
      contents: read
      id-token: write        # required for OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) needs npm >= 11.5.1.
      - run: npm install -g npm@latest
      - run: npm ci
      # Gate the publish on the same quality checks CI runs.
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm publish --provenance --access public
