name: Publish to npm

# Publishes @rushobservability/rum-sdk when you cut a GitHub Release
# (or trigger manually). Requires an npm **Automation** access token stored as
# the repo secret NPM_TOKEN — automation tokens bypass the 2FA one-time-password
# prompt, which interactive publish requires.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # enables npm provenance (verifiable build origin)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
