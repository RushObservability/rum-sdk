name: CI

# Typecheck, test, and build on every push + PR. No secrets, read-only token —
# this gates the publish workflow (which re-runs typecheck + test before release).
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
